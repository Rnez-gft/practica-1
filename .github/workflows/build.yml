name: Docker Comparison

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build simple image
        run: docker build -f Dockerfile.simple -t app-simple .

      - name: Build multistage image
        run: docker build -f Dockerfile.multistage -t app-multi .

      - name: Show image sizes
        run: docker images